<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <header class="header-dec">
        <div class="header-container">
            <div class="text-block">
                <h1 class="username">Welcome, Username</h1>
                <a href="/track_Performance">
                    <p class="link-text">Track Performance</p>
                </a>
                <a href="/training_plan">
                    <p class="link-text">Personalised training Plan</p>
                </a>
                <a href="add_data.html">
                    <p class="link-text">Personal data</p>
                </a>

            </div>
            <button class="logout-btn">Logout</button>
        </div>
    </header>

    <main>
        <h1>Add your personal data</h1>
        <form id = "data-form">
            <div class="mb-3">
                <label for="name" class="form-label">Name</label>
                <input type="text" id="name-register" class="form-control" placeholder="Enter your name"required>
            </div>
            <div class="mb-3">
                <label for="name" class="form-label">Height</label>
                <input type="text" id="name-register" class="form-control" placeholder="Height in Cm"required>
            </div>
            <div class="mb-3">
                <label for="name" class="form-label">weight</label>
                <input type="text" id="name-register" class="form-control" placeholder="weight is Kg"required>
            </div>
            <div class="mb-3">
                <label for="name" class="form-label">fights</label>
                <input type="text" id="name-register" class="form-control" placeholder="Total fights"required>
            </div>
            <div class="mb-3">
                <label for="name" class="form-label">Wins</label>
                <input type="text" id="name-register" class="form-control" placeholder="Total Wins"required>
            </div>
            <div class="mb-3">
                <label for="name" class="form-label">losses</label>
                <input type="text" id="name-register" class="form-control" placeholder="Losses"required>
            </div>
            <div class="mb-3">
                <label for="name" class="form-label">Draws</label>
                <input type="text" id="name-register" class="form-control" placeholder="Draws"required>
            </div>
        </form>
        <button>save</button>
    </main>
    <link rel="stylesheet" href="home.css">
</body>
</html>
