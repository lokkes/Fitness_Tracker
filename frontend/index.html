<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boxing Performance Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="hero d-flex flex-column justify-content-center">
        <div class="container hero-content text-center">
            <h1 class="display-3 fw-bold mb-3">Track Your Performance</h1>
            <p class="lead mb-4">
                Log your workouts, track progress, and get personalized training plans for your goals and fights.
            </p>
            <div class="d-flex justify-content-center gap-2">
                <button id="hero-login-button" class="btn btn-light btn-lg">Login</button>
                <button class="btn btn-primary btn-lg">Register</button>
            </div>
            <form id="login-form" class="login-dialog d-none p-4 border rounded">
                <h3 class="text-dark">Login</h3>
                <div class="mb-3">
                    <label for="email" class="form-label text-dark">Email</label>
                    <input type="email" id="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label text-dark">Password</label>
                    <input type="password" id="password" class="form-control" required>
                </div>
                <button id="login-submit-button" type="submit" class="btn btn-primary w-100">Login</button>
            </form>
        </div>
    </header>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
