<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boxing Performance Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style/style.css">
</head>

<body>
    <header class="hero d-flex flex-column justify-content-center">
<div class="container hero-content text-center">
    <h1 class="display-3 fw-bold mb-3">Track Your Performance</h1>
    <p class="lead mb-4">
        Log your workouts, track progress, and get personalized training plans.
    </p>

    <div class="d-flex justify-content-center gap-2 mb-4">
        <button id="hero-login-button" class="btn btn-dark">Login</button>
        <button id="hero-register-button" class="btn btn-dark">Register</button>
    </div>

    <!-- Form container -->
    <div class="form-container w-100 d-flex justify-content-center">
        <form id="login-form" class="login-dialog d-none p-4 border rounded bg-white text-dark col-12 col-md-6 col-lg-4">
            <h3>Login</h3>
            <div class="mb-3">
                <label for="email-login" class="form-label">Email</label>
                <input type="email" id="email-login" class="form-control" placeholder="Enter your email" required>
            </div>
            <div class="mb-3">
                <label for="password-login" class="form-label">Password</label>
                <input type="password" id="password-login" class="form-control" placeholder="Enter your Password"required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Login</button>
        </form>

        <form id="register-form" class="register-dialog d-none p-4 border rounded bg-white text-dark col-12 col-md-6 col-lg-4">
            <h3>Register</h3>
            <div class="mb-3">
                <label for="name-register" class="form-label">Name</label>
                <input type="text" id="name-register" class="form-control" placeholder="Enter your name"required>
            </div>
            <div class="mb-3">
                <label for="email-register" class="form-label">Email</label>
                <input type="email" id="email-register" class="form-control" placeholder="Enter your email"required>
            </div>
            <div class="mb-3">
                <label for="password-register" class="form-label">Password</label>
                <input type="password" id="password-register" class="form-control" placeholder="Enter your password"required>
            </div>
            <button type="submit" class="btn btn-primary w-100" id = "User-registration">Register</button>
        </form>
    </div>
</div>
    </header>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/script.js"></script>
</body>

</html>
