<!DOCTYPE html>
<html lang="en">

<head>

    <link rel="stylesheet" href="/static/style/home.css?v=3">

</head>

<body>
    <header class="header-dec">
        <div class="header-container">
            <div class="text-block">
                <h1 class="username">Welcome, Username</h1>

                    <p class="link-text">Track Performance</p>
                </a>
                <a href="/training_plan">
                    <p class="link-text">Personalised training Plan</p>

                <a href="/add_data.html">

            </div>
            <div>

                </a>

        </div>

    <main>

        </section>

            <h1>Personal Info</h1>

            <p id = "weight">Weight</p>
            </div>
        </section>
    </div>

    </main>
